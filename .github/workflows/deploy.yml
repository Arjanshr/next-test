name: Deploy Next.js Test Site

on:
  push:
    branches:
      - main   # or the branch you want to trigger deployment

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (Webpack)
        run: npm run build -- --webpack

      - name: Export static files
        run: npm run export

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: mobilemandu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "out/*"  # ✅ copy everything from out folder
          target: "/home/mobilemandu/test.mobilemandu.com"  # ✅ test subdomain folder
          rm: false  # ⚠ do NOT delete other files in folder